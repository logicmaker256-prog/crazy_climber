<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CRAZY CLIMBER 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --c-dusk:#1a0a2e;
    --c-void:#05040f;
    --c-cyan:#2dfcff;
    --c-magenta:#ff2bd6;
    --c-amber:#ffce3a;
    --c-text:#eef0ff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:#05040f; overflow:hidden; touch-action:none;
    font-family:'Noto Sans JP', sans-serif; color:var(--c-text);
    user-select:none;
  }
  #canvas-container{ position:fixed; inset:0; z-index:1; }
  #canvas-container canvas{ display:block; }

  #hud{
    position:fixed; top:0; left:0; width:100%; z-index:10;
    padding:max(12px, env(safe-area-inset-top)) 16px 0 16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
  }
  #hud .label{ font-size:11px; letter-spacing:2px; opacity:0.7; }
  #height-readout{ font-family:'Orbitron',sans-serif; font-size:7vw; font-weight:700; color:var(--c-cyan); text-shadow:0 0 10px rgba(45,252,255,0.9); line-height:1; }
  #lives{ display:flex; gap:6px; margin-top:4px; }
  .heart{ width:5.2vw; height:5.2vw; position:relative; }
  .heart svg{ width:100%; height:100%; filter:drop-shadow(0 0 6px var(--c-magenta)); }

  #height-bar-wrap{
    position:fixed; right:10px; top:18%; bottom:18%; width:9px; z-index:10;
    background:rgba(255,255,255,0.08); border-radius:6px; border:1px solid rgba(255,255,255,0.15);
  }
  #height-bar-fill{
    position:absolute; left:0; bottom:0; width:100%; height:0%; border-radius:6px;
    background:linear-gradient(180deg, var(--c-magenta), var(--c-cyan));
    box-shadow:0 0 10px var(--c-cyan);
    transition:height 0.25s ease-out;
  }
  #summit-mark{ position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:14px; }

  #flick-hint{
    position:fixed; left:14px; bottom:max(18px, env(safe-area-inset-bottom)); z-index:10;
    font-size:11px; line-height:1.7; opacity:0.55; pointer-events:none;
    text-shadow:0 0 6px #000;
  }
  #flick-hint b{ color:var(--c-cyan); font-weight:500; }

  .screen{
    position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    background:radial-gradient(ellipse at 50% 35%, rgba(60,10,90,0.55), rgba(2,1,8,0.97));
  }
  .game-title{
    font-family:'Orbitron',sans-serif; font-weight:900; letter-spacing:1px;
    font-size:11vw; line-height:1.05; color:#fff;
    text-shadow:0 0 6px var(--c-cyan), 0 0 22px var(--c-cyan), 0 0 48px var(--c-magenta);
  }
  .game-title .yr{ display:block; font-size:6vw; color:var(--c-magenta); text-shadow:0 0 10px var(--c-magenta), 0 0 26px var(--c-magenta); margin-top:4px; }
  .sub-jp{ margin-top:14px; font-size:4vw; letter-spacing:6px; opacity:0.85; }

  .ctrl-guide{ margin-top:28px; display:flex; flex-direction:column; gap:10px; font-size:3.6vw; }
  .ctrl-guide .row{ display:flex; align-items:center; gap:10px; justify-content:center; }
  .ctrl-guide .arrow{ font-family:'Orbitron',sans-serif; font-size:5vw; color:var(--c-cyan); text-shadow:0 0 8px var(--c-cyan); }

  .btn{
    margin-top:30px; padding:15px 42px; font-size:5vw; font-family:'Orbitron',sans-serif; font-weight:700;
    background:rgba(45,252,255,0.06); border:2px solid var(--c-cyan); color:var(--c-cyan);
    border-radius:10px; letter-spacing:2px;
    text-shadow:0 0 8px var(--c-cyan); box-shadow:0 0 18px rgba(45,252,255,0.5);
    pointer-events:auto;
  }
  .btn:active{ background:rgba(45,252,255,0.22); }
  .result-num{ font-family:'Orbitron',sans-serif; font-size:13vw; color:var(--c-amber); text-shadow:0 0 14px var(--c-amber); margin:10px 0; }
  .result-label{ font-size:3.6vw; opacity:0.75; letter-spacing:3px; }
  #gameover-screen .game-title, #win-screen .game-title{ font-size:9vw; }

  #flash-overlay{
    position:fixed; inset:0; z-index:25; background:var(--c-magenta);
    opacity:0; pointer-events:none; mix-blend-mode:screen;
  }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud" class="hidden">
  <div>
    <div class="label">HEIGHT</div>
    <div id="height-readout">0<span style="font-size:3vw;">m</span></div>
  </div>
  <div id="lives"></div>
</div>

<div id="height-bar-wrap" class="hidden">
  <div id="summit-mark">🏁</div>
  <div id="height-bar-fill"></div>
</div>

<div id="flick-hint" class="hidden">
  <div><b>↓フリック</b> = 登る</div>
  <div><b>→フリック</b> = 左へ移動</div>
  <div><b>←フリック</b> = 右へ移動</div>
</div>

<div id="flash-overlay"></div>

<div id="title-screen" class="screen">
  <div class="game-title">CRAZY<br>CLIMBER<span class="yr">2026</span></div>
  <div class="sub-jp">摩天楼アタック</div>
  <div class="ctrl-guide">
    <div class="row"><span class="arrow">↓</span> フリック → 登る</div>
    <div class="row"><span class="arrow">→</span> フリック → 左へ移動</div>
    <div class="row"><span class="arrow">←</span> フリック → 右へ移動</div>
  </div>
  <button class="btn" id="start-btn">TAP TO START</button>
</div>

<div id="gameover-screen" class="screen hidden">
  <div class="game-title" style="color:var(--c-magenta); text-shadow:0 0 10px var(--c-magenta),0 0 30px var(--c-magenta);">FALLEN</div>
  <div class="result-label">到達高度</div>
  <div class="result-num" id="go-height">0m</div>
  <button class="btn" id="retry-btn">RETRY</button>
</div>

<div id="win-screen" class="screen hidden">
  <div class="game-title">SUMMIT<br>CLEAR</div>
  <div class="result-label">到達高度</div>
  <div class="result-num" id="win-height">0m</div>
  <button class="btn" id="again-btn">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ===================== CONFIG ===================== */
const CFG = {
  LANE_COUNT: 5,
  LANE_WIDTH: 1.6,
  CLIMB_STEP: 1.4,
  MAX_HEIGHT: 120,
  LIVES_START: 3,
  HEIGHT_TO_METERS: 3,
  HAZARD_MIN_GAP: 4.2,
  HAZARD_LEAD: 7,
  HAZARD_RESOLVE_MARGIN: 1.3,
  TURRET_HOVER_MS: 2600,
  TURRET_FIRE_INTERVAL: 700,
  TURRET_SHOT_COUNT: 3,
  TURRET_FIRST_SHOT_DELAY: 350,
  BULLET_TRAVEL_MS: 550,
  CHAR_SCALE: 2/3,
  CHAR_HEIGHT_BASE: 1.83,
  CRACK_START_SIZE_MULT: 0.6,
  CRACK_END_SIZE_MULT: 2.0,
  GRIP_CRACK_START_MS: 900,
  GRIP_COLLAPSE_MS: 3000,
  FIRE_GROW_MS: 3000,
  FIRE_ERUPT_MS: 450,
  FIRE_FADE_MS: 350,
  FIRE_START_SCALE: 0.12,
  FIRE_GROW_SCALE: 0.42,
  FIRE_JET_LENGTH: 2.2,
  KNOCKBACK: 2.6,
  INVULN_MS: 1000,
  FLICK_MIN_DIST: 26,
  FLICK_MAX_TIME: 550,
  FOLLOW_LERP: 0.16
};

/* ===================== BASIC THREE SETUP ===================== */
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const duskColor = new THREE.Color('#1a0a2e');
const voidColor = new THREE.Color('#05040f');
scene.background = duskColor.clone();
scene.fog = new THREE.Fog(duskColor.getHex(), 8, 40);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 2.4, 5.6);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

/* lights */
scene.add(new THREE.AmbientLight(0x40406a, 0.65));
const moonLight = new THREE.DirectionalLight(0x8fa0ff, 0.5);
moonLight.position.set(3, 20, 6);
scene.add(moonLight);
const climberLight = new THREE.PointLight(0x2dfcff, 1.3, 8);
scene.add(climberLight);

/* ===================== TEXTURES ===================== */
/* wall geometry constants (declared here so the texture generator can
   size its canvas to match real-world proportions, not just pixel counts) */
const WALL_HEIGHT = 420;
const TEX_REPEAT_Y = 70;
const TILE_WORLD_HEIGHT = WALL_HEIGHT / TEX_REPEAT_Y; /* world height covered by one texture tile */
const WALL_WIDTH_MAIN = 9;

function makeBuildingTexture(opts){
  /* canvas pixel aspect is matched to the actual world tile aspect
     (worldWidth : TILE_WORLD_HEIGHT) so that 1px = the same world
     distance horizontally and vertically -- otherwise shapes drawn
     in pixel-space (like windows) come out stretched once mapped
     onto the wall. */
  const worldWidth = opts.worldWidth;
  const h = 480;
  const w = Math.round(h * (worldWidth / TILE_WORLD_HEIGHT));
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, opts.base0);
  grad.addColorStop(1, opts.base1);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  const cols = opts.cols, rows = opts.rows;
  const cellW = w/cols, cellH = h/rows;
  const neon = opts.neon;
  const kanjiList = opts.kanji || [];

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ww = cellW*0.74;
      const hh = ww * (2/3); /* window aspect ratio: height : width = 2 : 3, now in true world proportions */
      const x = c*cellW + (cellW-ww)/2;
      const y = r*cellH + (cellH-hh)/2;
      const lit = Math.random() < opts.litChance;
      if(lit){
        const col = neon[Math.floor(Math.random()*neon.length)];
        ctx.shadowColor = col;
        ctx.shadowBlur = 16;
        ctx.fillStyle = col;
      } else {
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(4,3,12,0.88)';
      }
      ctx.fillRect(x,y,ww,hh);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(150,150,190,0.35)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x,y,ww,hh);
    }
  }

  /* occasional neon kanji/katakana signage panel */
  const signCount = opts.signs || 3;
  for(let i=0;i<signCount;i++){
    const ch = kanjiList[Math.floor(Math.random()*kanjiList.length)];
    if(!ch) continue;
    const col = neon[Math.floor(Math.random()*neon.length)];
    const sx = (Math.random()*0.7+0.1)*w;
    const sy = (Math.random()*0.85+0.05)*h;
    const size = cellH*1.4;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.shadowColor = col;
    ctx.shadowBlur = 22;
    ctx.fillStyle = col;
    ctx.font = `bold ${size}px 'Noto Sans JP', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ch, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const mainTex = makeBuildingTexture({
  worldWidth: WALL_WIDTH_MAIN, base0:'#160826', base1:'#21103a', cols:6, rows:5, litChance:0.32,
  neon:['#2dfcff','#ff2bd6','#ffce3a','#39ff88'],
  kanji:['登','昇','頂','光','夜','電','竜'], signs:3
});
mainTex.repeat.set(1, TEX_REPEAT_Y);

/* ===================== BUILDING GEOMETRY =====================
   Only the front face exists as geometry. Beyond its left/right edges
   there is intentionally nothing but the night sky (gradient + stars
   defined below) -- this reads as open air past the building's corner
   instead of trying to fake a folded-back side wall. */
const mainWall = new THREE.Mesh(
  new THREE.PlaneGeometry(WALL_WIDTH_MAIN, WALL_HEIGHT),
  new THREE.MeshStandardMaterial({ map:mainTex, roughness:0.85, metalness:0.1 })
);
mainWall.position.set(0, WALL_HEIGHT/2 - 20, -1.6);
scene.add(mainWall);

/* ===================== ROOFTOP CAP =====================
   Marks the actual top of the building near the summit so reaching
   CFG.MAX_HEIGHT feels like arriving at a real rooftop instead of the
   wall texture just continuing forever past the goal. */
const ROOFTOP_Y = CFG.MAX_HEIGHT + 4;
const roofSlab = new THREE.Mesh(
  new THREE.PlaneGeometry(13, 10),
  new THREE.MeshStandardMaterial({ color:0x140a22, emissive:0x2a1240, emissiveIntensity:0.35, roughness:0.75, metalness:0.25 })
);
roofSlab.rotation.x = Math.PI/2;
roofSlab.position.set(0, ROOFTOP_Y, -3);
scene.add(roofSlab);

const roofTrim = new THREE.Mesh(
  new THREE.BoxGeometry(13, 0.3, 0.3),
  new THREE.MeshStandardMaterial({ color:0x2dfcff, emissive:0x2dfcff, emissiveIntensity:1.6 })
);
roofTrim.position.set(0, ROOFTOP_Y - 0.12, -0.6);
scene.add(roofTrim);

const roofGlow = new THREE.PointLight(0x2dfcff, 1.4, 22);
roofGlow.position.set(0, ROOFTOP_Y - 1, 1);
scene.add(roofGlow);

/* starfield (fades in with height) */
const starGeo = new THREE.BufferGeometry();
const starCount = 260;
const starPos = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  starPos[i*3] = (Math.random()-0.5)*60;
  starPos[i*3+1] = Math.random()*WALL_HEIGHT - 10;
  starPos[i*3+2] = -10 - Math.random()*20;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.18, transparent:true, opacity:0 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

/* ===================== CLIMBER ===================== */
function createClimber(){
  const group = new THREE.Group();
  const matBody = new THREE.MeshStandardMaterial({ color:0x1c2230, emissive:0x0a2a33, emissiveIntensity:0.5, roughness:0.4, metalness:0.6 });
  const matAccent = new THREE.MeshStandardMaterial({ color:0x2dfcff, emissive:0x2dfcff, emissiveIntensity:1.3 });
  const matVisor = new THREE.MeshStandardMaterial({ color:0xff2bd6, emissive:0xff2bd6, emissiveIntensity:1.5 });

  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.62,0.8,0.36), matBody);
  torso.position.y = 1.1;
  group.add(torso);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.27,16,16), matBody);
  head.position.y = 1.68;
  group.add(head);

  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.07,0.05), matVisor);
  visor.position.set(0,1.70,0.25);
  group.add(visor);

  function makeArm(side){
    const pivot = new THREE.Group();
    pivot.position.set(side*0.42, 1.46, 0);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.085,0.085,0.5,8), matBody);
    upper.position.y = -0.24;
    pivot.add(upper);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.125,8,8), matAccent);
    hand.position.y = -0.52;
    pivot.add(hand);
    return pivot;
  }
  const leftArm = makeArm(-1), rightArm = makeArm(1);
  group.add(leftArm, rightArm);

  function makeLeg(side){
    const pivot = new THREE.Group();
    pivot.position.set(side*0.2, 0.74, 0);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.11,0.55,8), matBody);
    upper.position.y = -0.27;
    pivot.add(upper);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.12,0.28), matAccent);
    foot.position.y = -0.56;
    pivot.add(foot);
    return pivot;
  }
  const leftLeg = makeLeg(-1), rightLeg = makeLeg(1);
  group.add(leftLeg, rightLeg);

  group.userData = { torso, leftArm, rightArm, leftLeg, rightLeg };
  return group;
}
const climberGroup = createClimber();
climberGroup.scale.setScalar(2/3);
scene.add(climberGroup);

/* ===================== TWEEN HELPER ===================== */
const tweens = [];
function addTween(target, prop, to, duration){
  tweens.push({ target, prop, from:target[prop], to, duration, t0:performance.now() });
}
function updateTweens(){
  const now = performance.now();
  for(let i=tweens.length-1;i>=0;i--){
    const tw = tweens[i];
    let p = (now - tw.t0)/tw.duration;
    if(p>=1) p=1;
    const eased = 1-Math.pow(1-p,3);
    tw.target[tw.prop] = tw.from + (tw.to-tw.from)*eased;
    if(p>=1) tweens.splice(i,1);
  }
}

/* ===================== SPARK FX ===================== */
function spawnSpark(pos, color){
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.9 });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8), mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  sparks.push({ mesh, t0:performance.now(), life:300 });
}
const sparks = [];
function updateSparks(){
  const now = performance.now();
  for(let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    const p = Math.min((now-s.t0)/s.life, 1);
    s.mesh.scale.setScalar(1+p*1.8);
    s.mesh.material.opacity = 0.9*(1-p);
    if(p>=1){ scene.remove(s.mesh); sparks.splice(i,1); }
  }
}

/* ===================== GRIP CRACK SYSTEM ===================== */
function makeCrackTexture(){
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,size,size);

  function jaggedPath(x0,y0,x1,y1,segments){
    const pts = [[x0,y0]];
    let x=x0, y=y0;
    for(let i=0;i<segments;i++){
      const t = (i+1)/segments;
      x = x0+(x1-x0)*t + (Math.random()-0.5)*22;
      y = y0+(y1-y0)*t + (Math.random()-0.5)*22;
      pts.push([x,y]);
    }
    return pts;
  }
  function strokePath(pts, width, color, blur){
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
  }

  const cx = size/2, cy = size/2;
  const mainPaths = [];
  for(let i=0;i<6;i++){
    const ang = (i/6)*Math.PI*2 + Math.random()*0.4;
    const len = 64 + Math.random()*60;
    mainPaths.push(jaggedPath(cx,cy, cx+Math.cos(ang)*len, cy+Math.sin(ang)*len, 4));
  }
  const subPaths = [];
  for(let i=0;i<5;i++){
    const ang = Math.random()*Math.PI*2;
    const len = 26 + Math.random()*40;
    const sx = cx + (Math.random()-0.5)*60;
    const sy = cy + (Math.random()-0.5)*60;
    subPaths.push(jaggedPath(sx,sy, sx+Math.cos(ang)*len, sy+Math.sin(ang)*len, 3));
  }

  /* bright glow underlay so it reads against any wall pattern */
  [...mainPaths, ...subPaths].forEach(p => strokePath(p, 7, 'rgba(255,140,40,0.55)', 16));
  /* crisp dark crack core on top */
  mainPaths.forEach(p => strokePath(p, 3, 'rgba(15,10,18,0.95)', 0));
  subPaths.forEach(p => strokePath(p, 2, 'rgba(28,20,26,0.85)', 0));
  ctx.shadowBlur = 0;

  return new THREE.CanvasTexture(canvas);
}

const crackTex = makeCrackTexture();
const CHAR_EFFECTIVE_HEIGHT = CFG.CHAR_HEIGHT_BASE * CFG.CHAR_SCALE;
const CRACK_START_SIZE = CHAR_EFFECTIVE_HEIGHT * CFG.CRACK_START_SIZE_MULT;
const CRACK_END_SIZE = CHAR_EFFECTIVE_HEIGHT * CFG.CRACK_END_SIZE_MULT;

/* each climbed/visited (lane, height) spot keeps its own crack progress,
   so leaving and coming back resumes where it left off instead of resetting */
const gripCracks = new Map();
let activeGrip = null;

function gripKey(lane, heightStep){ return lane + '_' + heightStep; }

function createCrackMeshInstance(){
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    new THREE.MeshBasicMaterial({ map:crackTex, transparent:true, opacity:0, depthWrite:false, depthTest:false })
  );
  mesh.rotation.z = Math.random() * Math.PI * 2;
  mesh.renderOrder = 5;
  scene.add(mesh);
  return mesh;
}

function deactivateGrip(now){
  if(activeGrip){
    activeGrip.bankedMs += now - activeGrip.activeStartTime;
    activeGrip.activeStartTime = null;
    activeGrip = null;
  }
}

function updateGripCrack(now){
  if(state.mode !== 'playing'){
    deactivateGrip(now);
    return;
  }

  const heightStep = Math.round(state.targetHeight / CFG.CLIMB_STEP);
  const key = gripKey(state.laneIndex, heightStep);

  if(!activeGrip || activeGrip.key !== key){
    deactivateGrip(now);
    let rec = gripCracks.get(key);
    if(!rec){
      rec = {
        key, lane: state.laneIndex, heightStep, height: heightStep * CFG.CLIMB_STEP,
        bankedMs: 0, activeStartTime: now, mesh: null, collapsed: false
      };
      gripCracks.set(key, rec);
    } else if(!rec.collapsed){
      rec.activeStartTime = now;
    }
    activeGrip = rec;
  }

  if(activeGrip.collapsed || activeGrip.activeStartTime === null) return;

  const totalMs = activeGrip.bankedMs + (now - activeGrip.activeStartTime);

  if(totalMs >= CFG.GRIP_CRACK_START_MS){
    if(!activeGrip.mesh){
      activeGrip.mesh = createCrackMeshInstance();
    }
    const p = Math.min((totalMs - CFG.GRIP_CRACK_START_MS) / (CFG.GRIP_COLLAPSE_MS - CFG.GRIP_CRACK_START_MS), 1);
    const size = CRACK_START_SIZE + p * (CRACK_END_SIZE - CRACK_START_SIZE);
    activeGrip.mesh.position.set(lanePositions[activeGrip.lane], activeGrip.height + CHAR_EFFECTIVE_HEIGHT*0.55, -1.2);
    activeGrip.mesh.scale.setScalar(size);
    activeGrip.mesh.material.opacity = 0.45 + p*0.55;
  }

  if(totalMs >= CFG.GRIP_COLLAPSE_MS){
    triggerGripCollapse(activeGrip);
  }
}

function triggerGripCollapse(rec){
  if(state.invulnerable || rec.collapsed) return;
  rec.collapsed = true;
  if(rec.mesh){
    scene.remove(rec.mesh);
    rec.mesh = null;
  }
  const pos = new THREE.Vector3(lanePositions[rec.lane], rec.height + CHAR_EFFECTIVE_HEIGHT*0.5, -1.4);
  createExplosion(pos);
  droneBoom();
  applyHit();
}

function clearAllGripCracks(){
  gripCracks.forEach(rec => { if(rec.mesh) scene.remove(rec.mesh); });
  gripCracks.clear();
  activeGrip = null;
}




/* ===================== GAME STATE ===================== */
const lanePositions = [];
for(let i=0;i<CFG.LANE_COUNT;i++){
  lanePositions.push((i - (CFG.LANE_COUNT-1)/2) * CFG.LANE_WIDTH);
}
const CENTER_LANE = Math.floor(CFG.LANE_COUNT/2);

let state = {
  mode: 'title', // title | playing | gameover | win
  laneIndex: CENTER_LANE,
  targetX: lanePositions[CENTER_LANE],
  currentX: lanePositions[CENTER_LANE],
  targetHeight: 0,
  currentHeight: 0,
  peakHeight: 0,
  lives: CFG.LIVES_START,
  climbToggle: false,
  invulnerable: false,
  lastHazardHeight: -100,
  hintShown: true
};

const hazards = [];

/* ===================== AUDIO ===================== */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
}
function beep(freq, duration, type, gain){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    g.gain.value = gain || 0.15;
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+duration);
    osc.stop(audioCtx.currentTime+duration+0.02);
  }catch(e){}
}

/* ===================== HAZARDS ===================== */
function createFireballMesh(){
  const group = new THREE.Group();
  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshStandardMaterial({ color:0xffb13a, emissive:0xff5a1a, emissiveIntensity:1.4, roughness:0.4 })
  );
  group.add(core);
  const light = new THREE.PointLight(0xff7a2a, 0.3, 4);
  group.add(light);
  group.userData = { core, light };
  group.renderOrder = 4;
  return group;
}

function createFlameJetMesh(){
  const mat = new THREE.MeshStandardMaterial({
    color:0xffae42, emissive:0xff3a00, emissiveIntensity:2.0,
    transparent:true, opacity:0.9, roughness:0.5, depthWrite:false
  });
  const cone = new THREE.Mesh(new THREE.ConeGeometry(0.5, CFG.FIRE_JET_LENGTH, 10), mat);
  cone.rotation.x = Math.PI/2; /* point the cone outward (+Z) toward the climber */
  cone.renderOrder = 4;
  return cone;
}

function fireWhoosh(){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    const t0 = audioCtx.currentTime;
    osc.frequency.setValueAtTime(180, t0);
    osc.frequency.exponentialRampToValueAtTime(640, t0+0.18);
    osc.frequency.exponentialRampToValueAtTime(120, t0+0.45);
    g.gain.setValueAtTime(0.22, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.5);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start();
    osc.stop(t0+0.55);
  }catch(e){}
}

function triggerFireEruption(hz){
  scene.remove(hz.mesh);
  hz.phase = 'erupt';
  hz.eruptStartTime = performance.now();
  const jet = createFlameJetMesh();
  jet.position.set(hz.x, hz.targetHeight, -1.4 + CFG.FIRE_JET_LENGTH/2);
  jet.scale.setScalar(0.15);
  scene.add(jet);
  hz.jetMesh = jet;
  fireWhoosh();
  for(let i=0;i<6;i++){
    const col = [0xffb13a,0xff5a1a,0xfff3a0][Math.floor(Math.random()*3)];
    spawnSpark(new THREE.Vector3(hz.x+(Math.random()-0.5)*0.3, hz.targetHeight+(Math.random()-0.5)*0.3, -1.0), col);
  }
}

function createDroneMesh(){
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color:0x1c1c2a, emissive:0xff2bd6, emissiveIntensity:0.8, metalness:0.7, roughness:0.3 });
  const body = new THREE.Mesh(new THREE.OctahedronGeometry(0.22,0), bodyMat);
  group.add(body);
  const armMat = new THREE.MeshStandardMaterial({ color:0x2a2a3a });
  const rotorMat = new THREE.MeshStandardMaterial({ color:0x2dfcff, emissive:0x2dfcff, emissiveIntensity:1.0 });
  [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([sx,sz])=>{
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.5,6), armMat);
    arm.rotation.z = Math.PI/2;
    arm.position.set(sx*0.22, 0, sz*0.22);
    group.add(arm);
    const rotor = new THREE.Mesh(new THREE.TorusGeometry(0.12,0.015,6,12), rotorMat);
    rotor.position.set(sx*0.42, 0, sz*0.22);
    rotor.rotation.x = Math.PI/2;
    group.add(rotor);
  });
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), new THREE.MeshStandardMaterial({ color:0xff2bd6, emissive:0xff2bd6, emissiveIntensity:2.2 }));
  eye.position.set(0,0,0.2);
  group.add(eye);
  return group;
}

function createExplosion(pos){
  const light = new THREE.PointLight(0xffb13a, 4.5, 11);
  light.position.copy(pos);
  scene.add(light);
  const t0 = performance.now();
  (function fadeLight(){
    const p = (performance.now()-t0)/350;
    if(p>=1){ scene.remove(light); return; }
    light.intensity = 4.5*(1-p);
    requestAnimationFrame(fadeLight);
  })();

  const colors = [0xffb13a, 0xff5a2b, 0xfff3a0, 0xff2bd6];
  for(let i=0;i<10;i++){
    const offset = new THREE.Vector3((Math.random()-0.5)*1.2, (Math.random()-0.5)*1.0, (Math.random()-0.5)*0.5);
    spawnSpark(pos.clone().add(offset), colors[Math.floor(Math.random()*colors.length)]);
  }
}

function droneBoom(){
  beep(90, 0.3, 'sawtooth', 0.25);
  setTimeout(()=>beep(220, 0.15, 'square', 0.12), 40);
}

function spawnDebrisPieces(hz){
  const count = 3 + Math.floor(Math.random()*2);
  for(let i=0;i<count;i++){
    const geo = Math.random() < 0.5
      ? new THREE.BoxGeometry(0.18,0.18,0.05)
      : new THREE.TetrahedronGeometry(0.14);
    const mat = new THREE.MeshStandardMaterial({ color:0xbfefff, emissive:0x2dfcff, emissiveIntensity:0.6, transparent:true, opacity:0.92 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(hz.x + (Math.random()-0.5)*0.6, hz.targetHeight, -1.2);
    scene.add(mesh);
    hz.debris.push({
      mesh,
      startY: hz.targetHeight,
      startTime: performance.now(),
      fallSpeed: 2.6 + Math.random()*1.6,
      driftX: (Math.random()-0.5)*0.8,
      rotSpeed: (Math.random()-0.5)*6,
      hasHit:false,
      dead:false
    });
  }
}

function triggerDroneExplosion(hz){
  scene.remove(hz.mesh);
  hz.phase = 'explode';
  hz.explodeTime = performance.now();
  const pos = new THREE.Vector3(hz.x, hz.targetHeight, -1.35);
  createExplosion(pos);
  droneBoom();
  if(!hz.hasHit && hz.lane === state.laneIndex && Math.abs(state.targetHeight - hz.targetHeight) < CFG.HAZARD_RESOLVE_MARGIN*1.6){
    applyHit();
    hz.hasHit = true;
  }
}

function spawnHazard(baseHeight){
  const lane = Math.floor(Math.random()*CFG.LANE_COUNT);
  const targetHeight = baseHeight + CFG.HAZARD_LEAD;
  const r = Math.random();
  const type = r < 0.34 ? 'turret' : (r < 0.67 ? 'drone' : 'fire');
  const x = lanePositions[lane];

  if(type === 'turret'){
    const mesh = new THREE.Mesh(
      new THREE.ConeGeometry(0.32, 0.5, 10),
      new THREE.MeshStandardMaterial({ color:0xff7a3a, emissive:0xff3a00, emissiveIntensity:0.5, transparent:true, opacity:1 })
    );
    mesh.rotation.x = Math.PI;
    mesh.position.set(x, targetHeight + 7, -1.0);
    scene.add(mesh);
    hazards.push({
      mesh, lane, type, x, targetHeight,
      phase:'approach', spawnTime:performance.now(),
      hoverStartTime:0, retreatStartTime:0,
      shotsFired:0, nextShotTime:0,
      bullets:[]
    });
  } else if(type === 'drone'){
    const mesh = createDroneMesh();
    const fromSide = lane < CENTER_LANE ? -7.5 : 7.5;
    mesh.position.set(fromSide, targetHeight, -1.0);
    scene.add(mesh);
    hazards.push({
      mesh, lane, type, x, fromX:fromSide, targetHeight,
      phase:'approach', approachDuration:1300, spawnTime:performance.now(),
      explodeTime:0, hasHit:false, debris:[]
    });
  } else {
    const mesh = createFireballMesh();
    mesh.position.set(x, targetHeight, -1.4);
    mesh.scale.setScalar(CFG.FIRE_START_SCALE);
    scene.add(mesh);
    hazards.push({
      mesh, lane, type, x, targetHeight,
      phase:'grow', spawnTime:performance.now(),
      eruptStartTime:0, fadeStartTime:0, jetMesh:null
    });
  }
}

function maybeSpawnHazard(currentHeight){
  if(currentHeight - state.lastHazardHeight < CFG.HAZARD_MIN_GAP) return;
  const difficulty = Math.min(currentHeight/CFG.MAX_HEIGHT, 1);
  const chance = 0.16 + difficulty*0.34;
  if(currentHeight > 6 && Math.random() < chance){
    spawnHazard(currentHeight);
    state.lastHazardHeight = currentHeight;
  }
}

function updateHazardVisuals(){
  const now = performance.now();
  for(let i=hazards.length-1;i>=0;i--){
    const hz = hazards[i];

    if(hz.type === 'fire'){
      if(hz.phase === 'grow'){
        const elapsed = now - hz.spawnTime;
        const p = Math.min(elapsed / CFG.FIRE_GROW_MS, 1);
        const flicker = 1 + Math.sin(now*0.02)*0.08 + Math.sin(now*0.047)*0.05;
        const s = (CFG.FIRE_START_SCALE + (CFG.FIRE_GROW_SCALE - CFG.FIRE_START_SCALE)*p) * flicker;
        hz.mesh.scale.setScalar(s);
        hz.mesh.userData.light.intensity = 0.3 + p*2.4;
        hz.mesh.userData.core.material.emissiveIntensity = 1.2 + p*1.6;
        if(p >= 1){
          triggerFireEruption(hz);
        }
      } else if(hz.phase === 'erupt'){
        const elapsed = now - hz.eruptStartTime;
        const p = Math.min(elapsed / CFG.FIRE_ERUPT_MS, 1);
        const s = THREE.MathUtils.lerp(0.15, 1, Math.min(p*2.2, 1));
        hz.jetMesh.scale.set(s, s, s);
        if(hz.lane === state.laneIndex && Math.abs(state.targetHeight - hz.targetHeight) < CFG.HAZARD_RESOLVE_MARGIN*1.6){
          applyHit();
        }
        if(elapsed >= CFG.FIRE_ERUPT_MS){
          hz.phase = 'fade';
          hz.fadeStartTime = now;
        }
      } else if(hz.phase === 'fade'){
        const elapsed = now - hz.fadeStartTime;
        const p = Math.min(elapsed / CFG.FIRE_FADE_MS, 1);
        hz.jetMesh.material.opacity = 0.9 * (1 - p);
        hz.jetMesh.scale.setScalar(1 + p*0.4);
        if(p >= 1){
          scene.remove(hz.jetMesh);
          hz.phase = 'done';
        }
      } else if(hz.phase === 'done'){
        hazards.splice(i,1);
      }
      continue;
    }

    if(hz.type === 'turret'){
      if(hz.phase === 'approach'){
        const elapsed = now - hz.spawnTime;
        const p = Math.min(elapsed/1100, 1);
        hz.mesh.position.y = THREE.MathUtils.lerp(hz.targetHeight+7, hz.targetHeight, p);
        hz.mesh.rotation.y += 0.08;
        if(p >= 1){
          hz.phase = 'hover';
          hz.hoverStartTime = now;
          hz.nextShotTime = now + CFG.TURRET_FIRST_SHOT_DELAY;
        }
      } else if(hz.phase === 'hover'){
        hz.mesh.position.y = hz.targetHeight + Math.sin(now*0.005)*0.1;
        hz.mesh.rotation.y += 0.03;
        if(hz.shotsFired < CFG.TURRET_SHOT_COUNT && now >= hz.nextShotTime){
          fireBullet(hz);
          hz.shotsFired++;
          hz.nextShotTime = now + CFG.TURRET_FIRE_INTERVAL;
        }
        if(now - hz.hoverStartTime > CFG.TURRET_HOVER_MS){
          hz.phase = 'retreat';
          hz.retreatStartTime = now;
        }
      } else if(hz.phase === 'retreat'){
        const rp = Math.min((now - hz.retreatStartTime)/600, 1);
        hz.mesh.position.y = hz.targetHeight + rp*5;
        hz.mesh.material.opacity = 1 - rp;
        hz.mesh.material.transparent = true;
        hz.mesh.rotation.y += 0.1;
        if(rp >= 1){
          scene.remove(hz.mesh);
          hz.phase = 'bulletsOnly';
        }
      }

      /* bullets keep flying independent of turret's own phase */
      let liveBullets = 0;
      hz.bullets.forEach(b => {
        if(b.dead) return;
        liveBullets++;
        const bp = Math.min((now - b.startTime)/CFG.BULLET_TRAVEL_MS, 1);
        b.mesh.position.lerpVectors(b.fromPos, b.toPos, bp);
        b.mesh.rotation.x += 0.3;
        if(bp >= 1){
          if(!b.hasHit && b.targetLane === state.laneIndex && Math.abs(state.targetHeight - b.targetHeight) < CFG.HAZARD_RESOLVE_MARGIN*1.6){
            applyHit();
            b.hasHit = true;
          }
          scene.remove(b.mesh);
          b.dead = true;
        }
      });

      if(hz.phase === 'bulletsOnly' && liveBullets === 0){
        hazards.splice(i,1);
      }
      continue;
    }

    /* drone: approach -> explode -> debris -> done */
    if(hz.phase === 'approach'){
      const elapsed = now - hz.spawnTime;
      const p = Math.min(elapsed/hz.approachDuration, 1);
      hz.mesh.position.x = THREE.MathUtils.lerp(hz.fromX, hz.x, p);
      hz.mesh.position.y = hz.targetHeight + Math.sin(now*0.012)*0.12;
      hz.mesh.position.z = THREE.MathUtils.lerp(-1.0, -1.35, p);
      hz.mesh.rotation.y += 0.25;
      if(p >= 1){
        triggerDroneExplosion(hz);
      }
    } else if(hz.phase === 'explode'){
      if(now - hz.explodeTime > 220){
        spawnDebrisPieces(hz);
        hz.phase = 'debris';
      }
    } else if(hz.phase === 'debris'){
      let aliveCount = 0;
      hz.debris.forEach(d => {
        if(d.dead) return;
        aliveCount++;
        const dt = (now - d.startTime)/1000;
        d.mesh.position.y = d.startY - d.fallSpeed*dt;
        d.mesh.position.x = hz.x + d.driftX*Math.min(dt,1);
        d.mesh.rotation.x += 0.12*d.rotSpeed;
        d.mesh.rotation.y += 0.09*d.rotSpeed;
        if(!d.hasHit && hz.lane === state.laneIndex && Math.abs(d.mesh.position.y - state.targetHeight) < CFG.HAZARD_RESOLVE_MARGIN){
          applyHit();
          d.hasHit = true;
        }
        if(d.mesh.position.y < hz.targetHeight - 9){
          scene.remove(d.mesh);
          d.dead = true;
        }
      });
      if(aliveCount === 0){
        hz.phase = 'done';
      }
    } else if(hz.phase === 'done'){
      hazards.splice(i,1);
    }
  }
}

function fireBullet(hz){
  const fromPos = hz.mesh.position.clone();
  const targetLane = state.laneIndex;
  const targetHeight = state.targetHeight;
  const toPos = new THREE.Vector3(lanePositions[targetLane], targetHeight + 1.3, 0);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.11, 8, 8),
    new THREE.MeshStandardMaterial({ color:0xffb13a, emissive:0xff3a00, emissiveIntensity:1.4 })
  );
  mesh.position.copy(fromPos);
  scene.add(mesh);
  hz.bullets.push({ mesh, fromPos, toPos, targetLane, targetHeight, startTime:performance.now(), hasHit:false, dead:false });
  laserZap();
}

function laserZap(){
  beep(640, 0.07, 'square', 0.1);
  setTimeout(()=>beep(420, 0.08, 'square', 0.08), 50);
}

/* ===================== HIT / DAMAGE ===================== */
let fallAnim = null;
let shakeUntil = 0;
let shakeMag = 0;

function triggerShake(mag, durationMs){
  shakeMag = mag;
  shakeUntil = performance.now() + durationMs;
}

function applyHit(){
  if(state.invulnerable) return;
  state.invulnerable = true;
  state.lives -= 1;
  flashScreen();
  beep(170, 0.22, 'sawtooth', 0.2);
  triggerShake(0.18, 180);
  updateHUD();
  startFallSequence();
}

function startFallSequence(){
  state.mode = 'falling';
  document.getElementById('flick-hint').classList.add('hidden');
  const startHeight = state.targetHeight;
  const duration = Math.min(1700, Math.max(600, startHeight * 85));
  fallAnim = { startHeight, startTime: performance.now(), duration };
  const spinDir = Math.random() < 0.5 ? -1 : 1;
  addTween(climberGroup.rotation, 'z', spinDir * Math.PI * 2.6, duration);
  addTween(climberGroup.rotation, 'x', 0.55, duration * 0.7);
  fallSwoosh();
}

function onLanded(){
  climberGroup.rotation.set(0,0,0);
  impactThud();
  triggerShake(0.4, 320);
  state.targetHeight = 0;
  state.currentHeight = 0;
  updateHUD();
  if(state.lives <= 0){
    setTimeout(triggerGameOver, 300);
  } else {
    setTimeout(() => {
      state.mode = 'playing';
      state.invulnerable = false;
      state.hintShown = true;
      document.getElementById('flick-hint').classList.remove('hidden');
    }, 450);
  }
}

function flashScreen(){
  const el = document.getElementById('flash-overlay');
  el.style.opacity = '0.55';
  setTimeout(()=>{ el.style.opacity = '0'; }, 160);
}

function fallSwoosh(){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    const t0 = audioCtx.currentTime;
    osc.frequency.setValueAtTime(700, t0);
    osc.frequency.exponentialRampToValueAtTime(70, t0 + 1.0);
    g.gain.setValueAtTime(0.16, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.05);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start();
    osc.stop(t0 + 1.1);
  }catch(e){}
}

function impactThud(){
  beep(60, 0.25, 'square', 0.28);
}

/* ===================== ACTIONS ===================== */
function moveLane(dir){
  if(state.mode !== 'playing') return;
  const next = Math.min(CFG.LANE_COUNT-1, Math.max(0, state.laneIndex + dir));
  if(next === state.laneIndex) return;
  state.laneIndex = next;
  state.targetX = lanePositions[next];
  addTween(climberGroup.userData.torso.rotation, 'z', dir > 0 ? -0.22 : 0.22, 110);
  setTimeout(() => addTween(climberGroup.userData.torso.rotation, 'z', 0, 180), 120);
  beep(520, 0.05, 'square', 0.06);
}

function climbUp(){
  if(state.mode !== 'playing') return;
  if(state.hintShown){
    state.hintShown = false;
    document.getElementById('flick-hint').classList.add('hidden');
  }
  state.targetHeight += CFG.CLIMB_STEP;
  if(state.targetHeight > state.peakHeight) state.peakHeight = state.targetHeight;
  performClimbAnim();
  maybeSpawnHazard(state.targetHeight);
  updateHUD();
  beep(880, 0.05, 'sine', 0.07);
  if(state.targetHeight >= CFG.MAX_HEIGHT){
    triggerWin();
  }
}

function performClimbAnim(){
  const { leftArm, rightArm, leftLeg, rightLeg } = climberGroup.userData;
  const toggled = state.climbToggle;
  state.climbToggle = !toggled;
  const upArm = toggled ? leftArm : rightArm;
  const downArm = toggled ? rightArm : leftArm;
  const upLeg = toggled ? rightLeg : leftLeg;
  const downLeg = toggled ? leftLeg : rightLeg;
  addTween(upArm.rotation, 'x', -1.9, 200);
  addTween(downArm.rotation, 'x', 0.35, 200);
  addTween(upLeg.rotation, 'x', -0.55, 200);
  addTween(downLeg.rotation, 'x', 0.3, 200);
  const handWorld = upArm.children[1].getWorldPosition(new THREE.Vector3());
  spawnSpark(handWorld, 0x2dfcff);
}

/* ===================== INPUT (FLICK) ===================== */
let tStartX=0, tStartY=0, tStartTime=0, tracking=false;

function inputStart(x,y){
  tStartX=x; tStartY=y; tStartTime=performance.now(); tracking=true;
}
function inputEnd(x,y){
  if(!tracking) return;
  tracking=false;
  const dx = x - tStartX, dy = y - tStartY;
  const dt = performance.now() - tStartTime;
  if(dt > CFG.FLICK_MAX_TIME) return;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if(Math.max(adx,ady) < CFG.FLICK_MIN_DIST) return;
  if(adx > ady){
    if(dx > 0) moveLane(-1); else moveLane(1);
  } else {
    if(dy > 0) climbUp();
  }
}

container.addEventListener('touchstart', e=>{
  const t = e.changedTouches[0];
  inputStart(t.clientX, t.clientY);
}, {passive:true});
container.addEventListener('touchend', e=>{
  const t = e.changedTouches[0];
  inputEnd(t.clientX, t.clientY);
}, {passive:true});
container.addEventListener('mousedown', e=> inputStart(e.clientX, e.clientY));
container.addEventListener('mouseup', e=> inputEnd(e.clientX, e.clientY));

/* ===================== HUD ===================== */
function heartSVG(filled){
  const color = filled ? '#ff2bd6' : 'rgba(255,255,255,0.18)';
  return `<svg viewBox="0 0 24 24"><path fill="${color}" d="M12 21s-8-5.4-8-11.2C4 6.6 6.5 4 9.4 4 11 4 12 4.9 12 4.9S13 4 14.6 4C17.5 4 20 6.6 20 9.8 20 15.4 12 21 12 21z"/></svg>`;
}
function updateHUD(){
  document.getElementById('height-readout').innerHTML =
    Math.floor(state.targetHeight*CFG.HEIGHT_TO_METERS) + '<span style="font-size:3vw;">m</span>';
  const livesEl = document.getElementById('lives');
  let html = '';
  for(let i=0;i<CFG.LIVES_START;i++){
    html += `<div class="heart">${heartSVG(i < state.lives)}</div>`;
  }
  livesEl.innerHTML = html;
  const ratio = Math.min(state.targetHeight/CFG.MAX_HEIGHT, 1);
  document.getElementById('height-bar-fill').style.height = (ratio*100)+'%';
}

/* ===================== SCREENS ===================== */
function showScreen(id){
  ['title-screen','gameover-screen','win-screen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}
function setPlayUI(visible){
  document.getElementById('hud').classList.toggle('hidden', !visible);
  document.getElementById('height-bar-wrap').classList.toggle('hidden', !visible);
  if(visible && state.hintShown) document.getElementById('flick-hint').classList.remove('hidden');
}

function resetGame(){
  hazards.forEach(h=>{
    if(h.mesh) scene.remove(h.mesh);
    if(h.debris) h.debris.forEach(d=>{ if(d.mesh) scene.remove(d.mesh); });
    if(h.bullets) h.bullets.forEach(b=>{ if(b.mesh) scene.remove(b.mesh); });
    if(h.jetMesh) scene.remove(h.jetMesh);
  });
  hazards.length = 0;
  clearAllGripCracks();
  state.laneIndex = CENTER_LANE;
  state.targetX = lanePositions[CENTER_LANE];
  state.currentX = lanePositions[CENTER_LANE];
  state.targetHeight = 0;
  state.currentHeight = 0;
  state.peakHeight = 0;
  state.lives = CFG.LIVES_START;
  state.climbToggle = false;
  state.invulnerable = false;
  state.lastHazardHeight = -100;
  state.hintShown = true;
  updateHUD();
}

function startGame(){
  ensureAudio();
  resetGame();
  state.mode = 'playing';
  showScreen(null);
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  setPlayUI(true);
}

function triggerGameOver(){
  state.mode = 'gameover';
  setPlayUI(false);
  document.getElementById('go-height').textContent = Math.floor(state.peakHeight*CFG.HEIGHT_TO_METERS)+'m';
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function triggerWin(){
  state.mode = 'win';
  setPlayUI(false);
  beep(660,0.12,'triangle',0.18);
  setTimeout(()=>beep(880,0.12,'triangle',0.18),130);
  setTimeout(()=>beep(1320,0.25,'triangle',0.2),260);
  document.getElementById('win-height').textContent = Math.floor(state.targetHeight*CFG.HEIGHT_TO_METERS)+'m';
  document.getElementById('win-screen').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('again-btn').addEventListener('click', startGame);

/* ===================== MAIN LOOP ===================== */
const clock = new THREE.Clock();

function updateAtmosphere(){
  const ratio = Math.min(state.currentHeight/CFG.MAX_HEIGHT, 1);
  const col = duskColor.clone().lerp(voidColor, ratio);
  scene.background = col;
  scene.fog.color = col;
  starMat.opacity = ratio*0.85;
  moonLight.intensity = 0.5 - ratio*0.25;
}

function animate(){
  requestAnimationFrame(animate);
  clock.getDelta();
  updateTweens();
  updateSparks();

  if(state.mode === 'falling' && fallAnim){
    const p = Math.min((performance.now() - fallAnim.startTime) / fallAnim.duration, 1);
    const eased = p * p; // ease-in: accelerating fall under "gravity"
    const h = fallAnim.startHeight * (1 - eased);
    state.currentHeight = h;
    state.targetHeight = h;
    updateHUD();
    if(p >= 1){
      fallAnim = null;
      onLanded();
    }
  } else {
    state.currentX += (state.targetX - state.currentX) * 0.22;
    state.currentHeight += (state.targetHeight - state.currentHeight) * 0.22;
  }

  climberGroup.position.x = state.currentX;
  climberGroup.position.y = state.currentHeight;
  climberLight.position.set(state.currentX, state.currentHeight+1.5, 0.6);

  camera.position.x += (state.currentX*0.7 - camera.position.x) * CFG.FOLLOW_LERP;
  camera.position.y = state.currentHeight + 2.3;
  camera.position.z = 5.6;

  if(performance.now() < shakeUntil){
    const remain = (shakeUntil - performance.now()) / 320;
    const s = shakeMag * remain;
    camera.position.x += (Math.random() - 0.5) * s;
    camera.position.y += (Math.random() - 0.5) * s;
  }

  camera.lookAt(state.currentX, state.currentHeight + 1.6, -1.5);

  updateHazardVisuals();
  updateAtmosphere();
  updateGripCrack(performance.now());

  renderer.render(scene, camera);
}

updateHUD();
animate();

})();
</script>
</body>
